<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <linearGradient id="pinkPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>
  </defs>

  <!-- Arka Plan ve Çerçeve -->
  <circle cx="256" cy="256" r="220" fill="url(#bg)" stroke="url(#pinkPurple)" stroke-width="40" />
  
  <!-- Kuzey-Güney-Doğu-Batı Çentikleri -->
  <line x1="256" y1="56" x2="256" y2="86" stroke="#71717a" stroke-width="20" stroke-linecap="round"/>
  <line x1="256" y1="426" x2="256" y2="456" stroke="#71717a" stroke-width="20" stroke-linecap="round"/>
  <line x1="56" y1="256" x2="86" y2="256" stroke="#71717a" stroke-width="20" stroke-linecap="round"/>
  <line x1="426" y1="256" x2="456" y2="256" stroke="#71717a" stroke-width="20" stroke-linecap="round"/>

  <!-- Kuzey İbresi (Mor/Pembe Parlak) -->
  <polygon points="256,110 206,256 306,256" fill="url(#pinkPurple)" />
  
  <!-- Güney İbresi (Koyu Gri) -->
  <polygon points="256,402 206,256 306,256" fill="#3f3f46" />
  
  <!-- Merkez Parçası -->
  <circle cx="256" cy="256" r="32" fill="#ffffff" />
  <circle cx="256" cy="256" r="12" fill="#9333ea" />
</svg>